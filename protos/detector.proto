syntax = "proto3";

package protos;

service DetectorService {
  rpc Detect(DetectRequest) returns (DetectResponse);
}

message DetectRequest {
  bytes image_bytes = 1;
  float confidence_threshold = 2;
}

message Detection {
  string class_name = 1;
  float confidence = 2;
  float x = 3;
  float y = 4;
  float width = 5;
  float height = 6;
}

message DetectResponse {
  repeated Detection detections = 1;
  double latency_ms = 2;
}
