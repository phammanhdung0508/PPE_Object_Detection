services:
  inference-service:
    build:
      context: .
      target: accelerated
    container_name: ppe-inference-service
    env_file:
      - .env
    ports:
      - "50051:50051"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 50051), timeout=5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  stream-ingestion:
    build:
      context: .
      target: ingestion
    container_name: ppe-stream-ingestion
    command:
      - "python"
      - "-m"
      - "stream_ingestion.ingest"
      - "--grpc-target"
      - "inference-service:50051"
      - "--source"
      - "${STREAM_SOURCE:-sample_videos/demo.mp4}"
      - "--frame-stride"
      - "${FRAME_STRIDE:-15}"
      - "--reconnect"
    depends_on:
      inference-service:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  stream-ingestion-batched:
    build:
      context: .
      target: ingestion
    container_name: ppe-stream-ingestion-batched
    command:
      - "python"
      - "-m"
      - "stream_ingestion.ingest_batched"
      - "--grpc-target"
      - "inference-service:50051"
      - "--source"
      - "${STREAM_SOURCE:-sample_videos/demo.mp4}"
      - "--camera-count"
      - "${CAMERA_COUNT:-4}"
      - "--batch-size"
      - "${BATCH_SIZE:-4}"
      - "--frame-stride"
      - "${FRAME_STRIDE:-15}"
    depends_on:
      inference-service:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - batched
    restart: unless-stopped

  ppe-api:
    build:
      context: .
      target: api
    container_name: ppe-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ppe-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - ppe-api
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ppe-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
